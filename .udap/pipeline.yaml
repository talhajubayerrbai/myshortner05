version: 1
name: myshortner05
vcs: github

stages:
  - id: provision
    kind: provision
    timeout_minutes: 20
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
    outputs:
      instance_ip: ${{ steps.tf_output.outputs.instance_ip }}
    steps:
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - name: Terraform Init
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: infra
      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve
        working-directory: infra
      - name: Capture outputs
        id: tf_output
        run: |
          echo "instance_ip=$(terraform output -raw instance_ip)" >> "$GITHUB_OUTPUT"
        working-directory: infra

  - id: configure
    kind: configure
    needs: [provision]
    timeout_minutes: 20
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
    steps:
      - name: Install Ansible and posix collection
        run: |
          pip install ansible-core
          ansible-galaxy collection install ansible.posix
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - name: Terraform Init (read outputs)
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: infra
      - name: Read RDS endpoint
        id: rds
        run: |
          echo "rds_endpoint=$(terraform output -raw rds_endpoint)" >> "$GITHUB_OUTPUT"
        working-directory: infra
      - name: Write SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
      - name: Scan host key
        run: ssh-keyscan -H "${{ needs.provision.outputs.instance_ip }}" >> ~/.ssh/known_hosts
      - name: Generate inventory
        run: |
          cat > ansible/inventory.ini <<EOF
          [app]
          ${{ needs.provision.outputs.instance_ip }} ansible_user=${{ secrets.SSH_USER }} ansible_ssh_private_key_file=~/.ssh/deploy_key
          EOF
      - name: Run playbook
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/site.yml
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          RDS_ENDPOINT: ${{ steps.rds.outputs.rds_endpoint }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}

  - id: verify
    kind: verify
    needs: [provision, configure]
    timeout_minutes: 5
    steps:
      - name: Health check
        run: |
          curl --fail --retry 10 --retry-delay 15 --retry-all-errors \
            http://${{ needs.provision.outputs.instance_ip }}:8000/health

rollback:
  strategy: manual
