name: deploy
'on':
  workflow_dispatch: {}
jobs:
  provision:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
    timeout-minutes: 20
    outputs:
      instance_ip: ${{ steps.tf_output.outputs.instance_ip }}
      rds_endpoint: ${{ steps.tf_output.outputs.rds_endpoint }}
    steps:
    - uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.5
    - name: Terraform Init
      run: "terraform init -input=false -reconfigure \\\n  -backend-config=\"bucket=${{\
        \ secrets.TF_STATE_BUCKET }}\" \\\n  -backend-config=\"key=${{ secrets.PROJECT_NAME\
        \ }}/terraform.tfstate\" \\\n  -backend-config=\"region=us-east-1\"\n"
      working-directory: infra
    - name: Terraform Apply
      run: terraform apply -input=false -auto-approve
      working-directory: infra
    - id: tf_output
      name: Capture outputs
      run: 'echo "instance_ip=$(terraform output -raw instance_ip)" >> "$GITHUB_OUTPUT"

        echo "rds_endpoint=$(terraform output -raw rds_endpoint)" >> "$GITHUB_OUTPUT"

        '
      working-directory: infra
  configure:
    runs-on: ubuntu-latest
    needs:
    - provision
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - name: Install Ansible
      run: pip install ansible-core
    - name: Write SSH key
      run: 'mkdir -p ~/.ssh

        printf ''%s\n'' "$SSH_KEY" > ~/.ssh/deploy_key

        chmod 600 ~/.ssh/deploy_key

        '
      env:
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    - name: Scan host key
      run: ssh-keyscan -H "${{ needs.provision.outputs.instance_ip }}" >> ~/.ssh/known_hosts
    - name: Generate inventory
      run: 'cat > ansible/inventory.ini <<EOF

        [app]

        ${{ needs.provision.outputs.instance_ip }} ansible_user=${{ secrets.SSH_USER
        }} ansible_ssh_private_key_file=~/.ssh/deploy_key

        EOF

        '
    - name: Run playbook
      run: 'ansible-playbook -i ansible/inventory.ini ansible/site.yml

        '
      env:
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        RDS_ENDPOINT: ${{ needs.provision.outputs.rds_endpoint }}
        PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
  verify:
    runs-on: ubuntu-latest
    needs:
    - provision
    - configure
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
    - name: Health check
      run: "curl --fail --retry 10 --retry-delay 15 --retry-all-errors \\\n  http://${{\
        \ needs.provision.outputs.instance_ip }}:8000/health\n"
